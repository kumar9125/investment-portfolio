services:
  # ── Backend Web Service ─────────────────────────────────────────────────────
  - type: web
    name: investment-tracker-backend
    env: node
    region: oregon
    # Path relative to the repository root (.git folder)
    rootDir: investment-tracker-main/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false          # e.g. https://investment-tracker-frontend.onrender.com

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: static
    name: investment-tracker-frontend
    # Path relative to the repository root (.git folder)
    rootDir: investment-tracker-main
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # e.g. https://investment-tracker-backend.onrender.com/api
    routes:
      # SPA fallback – all paths resolve to index.html
      - type: rewrite
        source: /*
        destination: /index.html
