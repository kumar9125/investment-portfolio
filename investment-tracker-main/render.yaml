# ⚠️  NOTE: This render.yaml is NOT read by Render.
# Render reads render.yaml from the REPOSITORY ROOT (where .git lives).
# The active render.yaml is at:
#   investment-tracker-main/render.yaml   (one level up from here)
#
# This file is kept only as a reference copy.
# Do NOT edit this file – edit the root render.yaml instead.

services:
  - type: web
    name: investment-tracker-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false

  - type: static
    name: investment-tracker-frontend
    rootDir: .
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
